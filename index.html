<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Index</title>
    <style>
        /* Basic reset for styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Styling the main body */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Container for the content */
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            margin-bottom: 10px;
            color: #2c3e50;
        }

        p {
            margin-bottom: 30px;
            color: #7f8c8d;
        }

        /* Styling the button links */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Space between buttons */
        }

        .btn {
            display: inline-block;
            background-color: #3498db;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        /* Hover and click effects for buttons */
        .btn:hover {
            background-color: #2980b9;
        }

        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My Website</h1>
        <p>Please select a destination from the options below.</p>

        <div class="button-group">
            <a href="about.html" class="btn">About Us</a>
            
            <a href="services.html" class="btn">Our Services</a>
            
            <a href="contact.html" class="btn">Contact</a>
            
            <a href="https://www.google.com" target="_blank" class="btn">External Link (Google)</a>
        </div>
    </div>

</body>
</html>
