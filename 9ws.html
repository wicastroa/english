<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>External Links Dashboard</title>
    <style>
        /* Basic page styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        /* Container to center and stack the buttons */
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 250px;
        }

        /* Styling the links to look like buttons */
        .btn {
            display: block;
            text-align: center;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background-color: #007bff;
            text-decoration: none;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        /* Hover effect for a dynamic feel */
        .btn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        /* Click effect */
        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <h1>Useful Links</h1>

    <div class="button-container">
        <a href="https://www.google.com" target="_blank" class="btn">Google</a>
        <a href="https://www.wikipedia.org" target="_blank" class="btn">Wikipedia</a>
        <a href="https://www.github.com" target="_blank" class="btn">GitHub</a>
        <a href="https://www.youtube.com" target="_blank" class="btn">YouTube</a>
        <a href="https://www.reddit.com" target="_blank" class="btn">Reddit</a>
    </div>

</body>
</html>
